name: Build and publish NGINX

on:
  push:
    branches:
      - master
    paths:
      - "nginx/**"
      - ".github/workflows/nginx.yml"
  pull_request:
    paths:
      - "nginx/**"
      - ".github/workflows/nginx.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nginx-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: qqqw5699/bywebol-nginx

jobs:
  test:
    name: Build and test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build test image
        uses: docker/build-push-action@v6
        with:
          context: ./nginx
          file: ./nginx/Dockerfile
          load: true
          push: false
          tags: ${{ env.IMAGE_NAME }}:test
          cache-from: type=gha,scope=nginx-test
          cache-to: type=gha,mode=max,scope=nginx-test

      - name: Test NGINX configuration
        run: docker run --rm "${IMAGE_NAME}:test" nginx -t

      - name: Show compiled modules
        run: docker run --rm "${IMAGE_NAME}:test" nginx -V

  publish:
    name: Publish multi-platform image
    if: github.event_name != 'pull_request'
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: qqqw5699
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./nginx
          file: ./nginx/Dockerfile
          platforms: linux/386,linux/amd64,linux/arm/v6,linux/arm/v7,linux/arm64,linux/ppc64le,linux/riscv64,linux/s390x
          push: true
          tags: ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha,scope=nginx-publish
          cache-to: type=gha,mode=max,scope=nginx-publish
